set_boost:
  name: Set Renson Boost
  description: Sets the Renson unit to manual mode with a specific fan speed percentage.
  fields:
    speed:
      name: Speed (%)
      description: Fan speed percentage (11 to 100).
      example: 100
      required: true
      selector:
        number:
          min: 11
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: box
    timer:
      name: Duration (minutes)
      description: How long the boost should last.
      example: 30
      required: false
      selector:
        number:
          min: 1
          max: 240
          step: 1
          unit_of_measurement: "min"
          mode: box

set_minimum:
  name: Set Renson Minimum
  description: Sets the Renson unit to its absolute minimum safe ventilation rate.
  fields:
    timer:
      name: Duration (minutes)
      description: How long the minimum mode should last.
      example: 60
      required: false
      selector:
        number:
          min: 1
          max: 480
          step: 1
          unit_of_measurement: "min"
          mode: box

set_auto:
  name: Reset Renson to Auto
  description: Cancels any active timers and returns the unit to automatic demand management.